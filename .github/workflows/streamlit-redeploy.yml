name: Auto-Redeploy on Push

on:
  push:
    branches:
      - main

jobs:
  deployment:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify code structure
        run: |
          echo "Verifying code structure..."
          test -f app.py && echo "✓ app.py found" || (echo "✗ app.py missing" && exit 1)
          test -f brew_extract.py && echo "✓ brew_extract.py found" || (echo "✗ brew_extract.py missing" && exit 1)
          test -d data && echo "✓ data/ folder found" || (echo "✗ data/ folder missing" && exit 1)
          echo "✓ Code structure verified"

      - name: Log deployment
        run: |
          echo "🚀 Push detected - Streamlit Cloud auto-redeploy initiated"
          echo "Commit: $(git rev-parse --short HEAD)"
          echo "Message: $(git log -1 --pretty=%B | head -n1)"
          echo "Streamlit will redeploy within 2-5 minutes"
